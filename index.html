<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Día de la Mujer</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1a1333,#3b1f52);
font-family:Georgia,serif;
}

/* ESCENA */

.scene{
position:relative;
width:520px;
height:480px;
}

/* SOBRE */

.envelope{
position:absolute;
bottom:0;
width:100%;
height:210px;
cursor:pointer;
}

.base{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#d62839,#b51f2e);
border-radius:8px;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.flap{
position:absolute;
width:100%;
height:120px;
background:linear-gradient(145deg,#ff758f,#ff4d6d);
clip-path:polygon(0 0,100% 0,50% 100%);
transform-origin:top;
transition:1s;
}

.open .flap{
transform:rotateX(-180deg);
}

/* PERGAMINO */

.scroll{
position:absolute;
left:5%;
width:90%;
height:0;
background:#fff3d6;
border-radius:10px;
padding:25px;
box-shadow:0 10px 35px rgba(0,0,0,.6);
overflow:hidden;
transition:height 1.6s ease, transform 1.6s ease;
transform:translateY(140px);
}

/* rodillos */

.rodillo{
position:absolute;
left:-14px;
width:calc(100% + 28px);
height:18px;
background:#c69c6d;
border-radius:10px;
}

.top{top:-12px;}
.bottom{bottom:-12px;}

.open .scroll{
height:300px;
transform:translateY(-260px);
}

/* FRASES */

.frase{
opacity:0;
transform:translateY(10px);
transition:1s;
text-align:center;
margin:14px;
font-size:19px;
color:#5a2a2a;
}

.visible{
opacity:1;
transform:translateY(0);
}

/* DESTELLO */

.sparkleText{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
animation:destello 1s forwards;
}

@keyframes destello{
0%{opacity:1;transform:scale(1)}
100%{opacity:0;transform:scale(3)}
}

/* ROSAS */

.rose{
position:absolute;
width:30px;
height:30px;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-40px) rotate(0deg)}
100%{transform:translateY(96vh) rotate(360deg)}
}

.floor{
position:absolute;
bottom:0;
width:100%;
height:120px;
}

/* CORAZONES */

.heart{
position:absolute;
font-size:20px;
color:#ff4d6d;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* LUCIERNAGAS */

.firefly{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
box-shadow:0 0 10px gold;
animation:glow 2s infinite;
}

@keyframes glow{
0%{opacity:.2}
50%{opacity:1}
100%{opacity:.2}
}

/* FUEGOS */

.fire{
position:absolute;
width:4px;
height:4px;
border-radius:50%;
}
#abrirBtn{
position:absolute;
bottom:40px;
padding:14px 28px;
font-size:18px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d6d,#ff758f);
color:white;
cursor:pointer;
box-shadow:0 8px 20px rgba(0,0,0,.4);
transition:transform .3s, box-shadow .3s;
}

#abrirBtn:hover{
transform:scale(1.1);
box-shadow:0 10px 25px rgba(0,0,0,.6);
}
</style>
</head>

<body>

<audio id="music" loop>
<source src="tu-cancion.mp3" type="audio/mpeg">
</audio>

<div class="scene">

<div class="envelope" id="sobre" onclick="abrir()">

<div class="flap"></div>
<div class="base"></div>

<div class="scroll">

<div class="rodillo top"></div>
<div class="rodillo bottom"></div>

<h2 class="frase">🌸 Feliz Día de la Mujer 🌸</h2>

<p class="frase">Hoy celebramos tu fuerza.</p>
<p class="frase">Tu inteligencia que inspira.</p>
<p class="frase">Tu valentía para cambiar el mundo.</p>
<p class="frase">Tu belleza única.</p>
<p class="frase">🌹 Gracias por existir 🌹</p>

</div>
<button id="abrirBtn" onclick="abrir()">Abrir carta 💌</button>
</div>

<div class="floor" id="floor"></div>

</div>

<script>

function abrir(){

document.getElementById("sobre").classList.add("open");
document.getElementById("music").play();

mostrarFrases();

setInterval(fuegosFinal,3000);

}

/* FRASES */

function mostrarFrases(){

let frases=document.querySelectorAll(".frase");

frases.forEach((f,i)=>{

setTimeout(()=>{

f.classList.add("visible");

destelloTexto(f);

},900*i);

});

}

/* DESTELLOS */

function destelloTexto(el){

for(let i=0;i<6;i++){

let s=document.createElement("div");

s.className="sparkleText";

let rect=el.getBoundingClientRect();

s.style.left=(rect.left+Math.random()*rect.width)+"px";
s.style.top=(rect.top+Math.random()*rect.height)+"px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),1000);

}

}

/* ROSAS */

function crearRosa(){

let r=document.createElement("div");

r.className="rose";

r.innerHTML=`
<svg viewBox="0 0 24 24">
<path fill="#c1121f" d="M12 2C9 5 6 6 6 9c0 2 1 3 2 4-2 1-3 3-3 5a6 6 0 0012 0c0-2-1-4-3-5 1-1 2-2 2-4 0-3-3-4-6-7z"/>
</svg>
`;

r.style.left=Math.random()*100+"vw";
r.style.animationDuration=(4+Math.random()*3)+"s";

document.body.appendChild(r);

setTimeout(()=>{

document.getElementById("floor").appendChild(r);

r.style.position="absolute";
r.style.bottom="0";
r.style.top="auto";

},4500);

}

setInterval(crearRosa,400);

/* CORAZONES */

function heart(){

let h=document.createElement("div");

h.className="heart";
h.innerHTML="❤";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

setInterval(heart,1200);
function abrir(){

document.getElementById("sobre").classList.add("open")

document.getElementById("abrirBtn").style.display="none"

document.getElementById("music").play()

mostrarFrases()

setInterval(fuegos,2500)

}
/* LUCIERNAGAS */

function firefly(){

let f=document.createElement("div");

f.className="firefly";

f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*100+"vh";

document.body.appendChild(f);

setTimeout(()=>f.remove(),4000);

}

setInterval(firefly,300);

/* FUEGOS */

function fuegosFinal(){

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight*0.4;

for(let j=0;j<70;j++){

let p=document.createElement("div");

p.className="fire";

p.style.left=x+"px";
p.style.top=y+"px";

let angle=Math.random()*2*Math.PI;
let dist=Math.random()*220;

let dx=Math.cos(angle)*dist;
let dy=Math.sin(angle)*dist;

p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${dx}px,${dy}px)`,opacity:0}
],{duration:1400});

p.style.background=`hsl(${Math.random()*360},100%,60%)`;

document.body.appendChild(p);

setTimeout(()=>p.remove(),1400);

}

}

</script>

</body>
</html>
